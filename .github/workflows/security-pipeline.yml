name: "🛡️ JuiceShop Security Shield"

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:
  

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
     
      - name: 🛡️ Gitleaks (Full Scan)
        run: |
          # We download the gitleaks tool and run it directly on the whole folder
          docker run -v ${PWD}:/path zricethezav/gitleaks:latest detect --source="/path" --verbose --redact
        continue-on-error: true
      - name: 📦 Generate Lockfile (Safe Mode)
        run: |
          # --package-lock-only: Don't download the heavy node_modules
          # --ignore-scripts: Don't run the broken 'postinstall' build
          # --legacy-peer-deps: Avoid "Peer Dependency" conflicts with old libraries
          npm install --package-lock-only --ignore-scripts --legacy-peer-deps

      - name: 🛡️ Trivy Scan (The Final Victory)
        run: |
          docker run --rm -v ${{ github.workspace }}:/app \
            aquasec/trivy:latest fs --scanners vuln --severity HIGH,CRITICAL /app
      - name: Build Docker Image
        run: |
          docker build -t juice-shop .
          echo "✅ Docker build successful!"
