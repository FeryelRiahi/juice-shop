name: "🛡️ JuiceShop Security Shield"

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  issues: write
  security-events: write # CRITICAL: This allows the "Security Tab" to receive data

jobs:
  # 1. SECRETS (SARIF)
  gitleaks-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🛡️ Gitleaks (Full Scan)
        run: |
          docker run -v ${{ github.workspace }}:/path zricethezav/gitleaks:latest detect \
            --source="/path" \
            --report-format sarif \
            --report-path="/path/gitleaks.sarif" \
            --redact \
            --exit-code 0

      - name: 📤 Upload Gitleaks to Security Tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: gitleaks.sarif
          category: gitleaks-secrets

  # 2. CODE QUALITY (Direct Integration)
  sonarqube-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: 🛡️ SonarQube Analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          docker run --rm -v ${{ github.workspace }}:/usr/src sonarsource/sonar-scanner-cli \
            -Dsonar.projectKey=FeryelRiahi_juice-shop -Dsonar.organization=feryelriahi \
            -Dsonar.host.url=https://sonarcloud.io -Dsonar.login=${{ secrets.SONAR_TOKEN }} \
            -Dsonar.qualitygate.wait=true

  # 3. CONTAINER (SARIF)
  container-security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: 🐳 Build Staging Image
        run: docker build -t juice-shop:staging .
      - name: 🛡️ Trivy Image Scan
        run: |
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock -v ${PWD}:/path \
            aquasec/trivy:latest image --format sarif --output /path/trivy.sarif \
            --severity HIGH,CRITICAL juice-shop:staging
      - name: 📤 Upload Trivy to Security Tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy.sarif
          category: trivy-container-scan

  # 4. DYNAMIC (SARIF + ISSUES)
  dynamic-security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: 🐳 Build DAST Image
        run: docker build -t juice-shop:dast .
      - name: 🚀 Run Juice Shop
        run: |
          docker run -d -p 3000:3000 --name juice-shop-test juice-shop:dast
          sleep 20 
      - name: 🔓 Fix Permissions for ZAP
        run: chmod -R 777 . 
      - name: 🕸️ ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:3000'
          token: ${{ secrets.GITHUB_TOKEN }}
          sarif_export: true 

      - name: 📤 Upload ZAP to Security Tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          # The ZAP action hardcodes this filename to 'results.sarif'
          sarif_file: 'results.sarif'
          category: zap-dast

  # 5. THE GATE
  promotion:
    needs: [gitleaks-scan, sonarqube-scan, container-security, dynamic-security]
    runs-on: ubuntu-latest
    steps:
      - name: ✅ Final Approval
        run: echo "All security gates passed. Image is cleared for Production."
