name: "🛡️ JuiceShop Security Shield"

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:
  

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
     
      - name: 🛡️ Gitleaks (Full Scan)
        run: |
          # We download the gitleaks tool and run it directly on the whole folder
          docker run -v ${PWD}:/path zricethezav/gitleaks:latest detect --source="/path" --verbose --redact
        continue-on-error: true
      - name: 🛡️ Trivy (Dependency Scan)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.' # Scan the whole directory
          # We tell Trivy specifically to look for vulnerabilities in code and libraries
          scanners: 'vuln,secret' 
          format: 'table'
          severity: 'CRITICAL,HIGH''

      - name: Build Docker Image
        run: |
          docker build -t juice-shop .
          echo "✅ Docker build successful!"
