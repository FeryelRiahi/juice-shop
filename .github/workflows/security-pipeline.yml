name: "🛡️ JuiceShop Security Shield"

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # JOB 1: Scanning the Source Code (SAST & Secrets)
  static-security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🛡️ Gitleaks (Full Scan)
        run: |
          docker run -v ${PWD}:/path zricethezav/gitleaks:latest detect --source="/path" --verbose --redact --exit-code 1

      - name: 🛡️ SonarQube Analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/usr/src \
            sonarsource/sonar-scanner-cli \
            -Dsonar.projectKey=FeryelRiahi_juice-shop \
            -Dsonar.organization=feryelriahi \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.login=${{ secrets.SONAR_TOKEN }} \
            -Dsonar.qualitygate.wait=true

  # JOB 2: Scanning the Infrastructure (SCA)
  container-security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: 🐳 Build Staging Image
        run: docker build -t juice-shop:staging .

      - name: 🛡️ Trivy Image Scan
        run: |
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:latest image \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            --ignore-unfixed \
            juice-shop:staging
# JOB 3: Scanning the Running App (DAST)
  dynamic-security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: 🐳 Build DAST Image
        run: docker build -t juice-shop:dast .

      - name: 🚀 Run Juice Shop
        run: |
          docker run -d -p 3000:3000 --name juice-shop-test juice-shop:dast
          # Wait for the app to wake up
          sleep 20 

      - name: 🔓 Fix Permissions for ZAP
        # This is the magic line that prevents the Permission Error (Errno 13)
        run: chmod -R 777 . 

      - name: 🕸️ ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:3000'
          fail_action: true
          token: ${{ secrets.GITHUB_TOKEN }}

  # FINAL GATE: This job only runs if everything else passes
  promotion:
    needs: [static-security, container-security, dynamic-security]
    runs-on: ubuntu-latest
    steps:
      - name: ✅ Final Approval
        run: echo "All security gates passed. Image is cleared for Production."
