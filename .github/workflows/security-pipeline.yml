name: "🛡️ JuiceShop Security Shield"

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:
  

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
     
      - name: 🛡️ Gitleaks (Full Scan)
        run: |
          # We download the gitleaks tool and run it directly on the whole folder
          docker run -v ${PWD}:/path zricethezav/gitleaks:latest detect --source="/path" --verbose --redact
        continue-on-error: true
      - name: 🛡️ Trivy (Docker Scan)
        run: |
          # We run Trivy inside its own container to avoid permission issues
          docker run -v ${{ github.workspace }}:/root/.cache/ -v ${PWD}:/path aquasec/trivy:latest fs --scanners vuln --severity CRITICAL,HIGH /path
        continue-on-error: true
     
      - name: Build Docker Image
        run: |
          docker build -t juice-shop .
          echo "✅ Docker build successful!"
